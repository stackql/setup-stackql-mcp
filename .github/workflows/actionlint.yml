name: actionlint

on:
  push:
    branches:
    - main
    - 'develop-**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: lint workflows and examples
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Pinned actionlint image; bundles shellcheck so the composite action's and
    # examples' run: blocks get checked too. The runner's bash expands the globs
    # to real paths before they reach the container.
    - name: Run actionlint
      run: |
        docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 \
          -color .github/workflows/*.yml examples/*.yml
